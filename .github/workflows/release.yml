name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    env:
      # Read in `if:` conditions, which cannot test the secrets context directly.
      AMO_KEY: ${{ secrets.WEB_EXT_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # A tagged build is not the place to discover a lint error.
      - name: Verify
        run: npm run verify

      - name: Refuse to release a tag that disagrees with package.json
        id: meta
        run: |
          tagged="${GITHUB_REF_NAME#v}"
          declared="$(node -p 'require("./package.json").version')"
          if [ "$tagged" != "$declared" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $declared"
            exit 1
          fi
          # Artefacts are named after the package version, which has no `v`.
          # The release notes name those files, so they need this, not the tag.
          echo "version=$tagged" >> "$GITHUB_OUTPUT"

      - name: Package Chrome
        run: npx wxt zip -b chrome

      - name: Package Firefox
        run: npx wxt zip -b firefox

      # The signed .xpi is the only Firefox build that ships, so signing is
      # required rather than best effort. An unsigned zip can only be loaded as
      # a temporary add-on that disappears when the browser closes, which is a
      # worse first experience than no download, so it is not published.
      #
      # This means a release without credentials fails here instead of quietly
      # producing nothing for Firefox.
      - name: Refuse to release without signing credentials
        if: env.AMO_KEY == ''
        run: |
          echo '::error::WEB_EXT_API_KEY and WEB_EXT_API_SECRET are required.'
          echo 'Firefox releases ship a signed .xpi only. Get credentials at'
          echo 'https://addons.mozilla.org/en-US/developers/addon/api/key/ and add'
          echo 'them under Settings, Secrets and variables, Actions.'
          exit 1

      - name: Sign for Firefox
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: npm run sign:firefox

      # AMO names the signed file after an internal identifier, something like
      # 5311af59627749b69d2d-0.2.1.xpi, which tells a reader nothing about what
      # they are downloading.
      - name: Name the signed build after the release
        run: |
          xpi=$(ls .output/signed/*.xpi 2>/dev/null | head -1)
          if [ -z "$xpi" ]; then
            echo '::error::Signing reported success but produced no .xpi.'
            exit 1
          fi
          mv "$xpi" ".output/signed/lbc-prix-m2-${{ steps.meta.outputs.version }}-firefox.xpi"

      # The Firefox zip is built on the way to signing but never published. It
      # would install only as a temporary add-on, and offering it beside a
      # signed build invites people to pick the one that disappears.
      - name: Withhold the unsigned Firefox zip
        run: rm -f .output/*-firefox.zip

      # The zips are the whole distribution, so the instructions travel with
      # them. Anyone landing on a release page from a link has everything they
      # need without opening the repository.
      #
      # Each paragraph below is one long line on purpose. GitHub renders release
      # bodies the way it renders issues and comments, where a single newline is
      # a line break rather than a space. Wrapping this text at 80 columns, as
      # the rest of the repository does, turns every paragraph into a narrow
      # ragged column.
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            .output/*.zip
            .output/signed/*.xpi
          generate_release_notes: true
          body: |
            Shows the price per square metre on every property ad in a leboncoin search, next to the price leboncoin already prints, and adds two sort options leboncoin does not offer: by price per square metre, ascending and descending.

            ## Install

            Download the file for your browser from **Assets** below. Firefox takes the `.xpi`, Chrome takes the `.zip`.

            ### Firefox

            Download `lbc-prix-m2-${{ steps.meta.outputs.version }}-firefox.xpi`, then open it with Firefox or drag it onto the browser window. Firefox asks you to confirm the permissions once, and it stays installed.

            The file is signed by Mozilla, which is what allows a permanent install. Release Firefox runs signed add-ons only, and the `xpinstall.signatures.required` setting from older forum posts is ignored there. See [add-on signing in Firefox](https://support.mozilla.org/en-US/kb/add-on-signing-in-firefox).

            No unsigned zip is published for Firefox. It would install as a temporary add-on that disappears when the browser closes, which is a worse first experience than no download at all. To build and sign your own, see [A permanent Firefox install](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md#a-permanent-firefox-install).

            ### Chrome

            1. Extract `lbc-prix-m2-${{ steps.meta.outputs.version }}-chrome.zip` somewhere you can leave it, since Chrome reloads the folder from disk on every launch
            2. Open `chrome://extensions` and turn on **Developer mode** (top right)
            3. Click **Load unpacked** and select the extracted folder

            This one survives restarts. Chrome shows a developer-mode warning on each launch, which you can dismiss.

            ### Then

            Open a search such as [rentals](https://www.leboncoin.fr/recherche?category=10) or [sales](https://www.leboncoin.fr/recherche?category=9). Badges appear next to the prices, and the sort menu gains two options. The toolbar icon toggles the badges off.

            Sorting by price per square metre collects the pages of your search, one request at a time, because leboncoin sorts on its server and offers no such ordering. A banner above the results says how much was collected. A filtered search takes a few requests; a very broad one cannot be sorted completely by anyone, since leboncoin refuses to paginate past 100 pages.

            No data about you leaves your browser. The only permission requested is `storage`, used to remember whether badges are switched on.

            `lbc-prix-m2-${{ steps.meta.outputs.version }}-sources.zip` is the unbundled source, kept for reproducibility.
