name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to a PR makes the previous run irrelevant.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # `npm ci` runs `wxt prepare` via postinstall, which generates the
      # .wxt/ types that typecheck depends on.
      - run: npm ci

      - name: Formatting
        run: npm run format:check

      - name: Prose
        run: npm run lint:prose

      - name: Lint
        run: npm run lint

      - name: Types
        run: npx tsc --noEmit

      - name: Tests
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [chrome, firefox]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build
        run: npx wxt build -b ${{ matrix.target }}

      - name: Package
        run: npx wxt zip -b ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: .output/*.zip
          retention-days: 14

  icons:
    name: Icons match their generator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # The PNGs are committed so a fresh clone can build without running the
      # generator. This proves the two have not drifted apart.
      - run: node scripts/generate-icons.mjs
      - run: git diff --exit-code -- src/public/icon
