version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
    groups:
      # One PR for the toolchain rather than five. They move together and are
      # verified by the same CI run either way.
      dev-tooling:
        patterns:
          - '@commitlint/*'
          - '@eslint/*'
          - 'eslint*'
          - 'typescript-eslint'
          - 'prettier*'
          - 'husky'
          - 'lint-staged'
        update-types: [minor, patch]
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - 'happy-dom'
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: 'chore(ci)'
