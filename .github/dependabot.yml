version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
    ignore:
      # TypeScript is pinned to 5.x by something outside our control:
      # typescript-eslint declares `typescript: ">=4.8.4 <6.1.0"`. TypeScript 7
      # is the Go rewrite and falls outside that range, so a major bump leaves
      # the tests and the build green while `npm run lint` fails, which reads
      # like a flaky PR rather than an unsupported dependency.
      #
      # Lift this once typescript-eslint supports 7.x. Minor and patch updates
      # still come through.
      - dependency-name: typescript
        update-types: ['version-update:semver-major']

      # @types/node majors track Node majors. The runtime here is pinned to 20
      # by .nvmrc and by engines, so accepting types from a newer Node lets
      # `tsc` approve calls to APIs that are not there when the code runs. CI
      # goes green and the failure happens later, somewhere else.
      #
      # Lift this together with .nvmrc, not on its own. Minor and patch updates
      # still come through.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
    groups:
      # One PR for the toolchain rather than five. They move together and are
      # verified by the same CI run either way.
      dev-tooling:
        patterns:
          - '@commitlint/*'
          - '@eslint/*'
          - 'eslint*'
          - 'typescript-eslint'
          - 'prettier*'
          - 'husky'
          - 'lint-staged'
        update-types: [minor, patch]
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - 'happy-dom'
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: 'chore(ci)'
