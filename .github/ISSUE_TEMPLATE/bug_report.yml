name: Bug report
description: Something misbehaves, other than badges going missing.
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        If the badges have simply stopped appearing, use the
        **Badges have stopped appearing** template instead. It asks for the one
        thing that actually fixes those.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected instead
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open https://www.leboncoin.fr/recherche?category=10
        2. Scroll to the second page of results
        3. …
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console output
      description: Anything prefixed with `[lbc-prix-m2]`.
      render: text
