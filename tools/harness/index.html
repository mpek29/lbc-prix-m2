<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Harness — badge rendering</title>
    <style>
      /*
       * Deliberately minimal. This stands in for leboncoin's own layout so the
       * cards are legible in a screenshot — it must never style the badge,
       * which has to come entirely from src/ui/price-badge.css.
       */
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        color: #111;
        font:
          15px/1.5 system-ui,
          sans-serif;
      }
      h1 {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #888;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 12px;
        max-width: 720px;
      }
      li {
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 12px 16px;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
      }
      img,
      picture {
        display: none;
      }
      .gap-sm {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .text-callout {
        font-size: 18px;
        font-weight: 700;
        margin: 0;
      }
      p {
        margin: 2px 0;
      }
    </style>
  </head>
  <body>
    <h1>Captured leboncoin cards, enhanced by the real code</h1>
    <div id="results"></div>
    <script type="module" src="./entry.ts"></script>
  </body>
</html>
