<!--
  A decoy, and the reason this file exists.

  Every ad card's photo carousel renders its dot indicators as a radiogroup, so
  a search results page contains 35 of these and exactly one sort control. Any
  attempt to find the sort control by `[role="radiogroup"]` alone picks a
  carousel first and injects the sort options into an ad photo.

  Note what these buttons do not have: a `value` attribute.
-->
<div data-spark-component="carousel-page-picker" role="radiogroup" id="carousel::_r_1o_::indicator-group" data-scope="carousel" data-part="indicator-group" data-orientation="horizontal" dir="ltr" class="flex-wrap items-center justify-center default:min-h-sz-16 flex bottom-sz-12 absolute inset-x-0"><button data-spark-component="carousel-page-indicator" role="radio" id="carousel::_r_1o_::indicator:0" aria-checked="true" data-scope="carousel" data-part="indicator" data-orientation="horizontal" data-index="0" data-state="active" tabindex="0" aria-label="Passer à la photo 1 sur 5" class="border-outline group relative flex justify-center border-0 hover:cursor-pointer m-sm rounded-sm"></button><button data-spark-component="carousel-page-indicator" role="radio" id="carousel::_r_1o_::indicator:1" aria-checked="false" data-scope="carousel" data-part="indicator" data-orientation="horizontal" data-index="1" data-state="idle" tabindex="-1" aria-label="Passer à la photo 2 sur 5" class="border-outline group relative flex justify-center border-0 hover:cursor-pointer m-sm rounded-sm"></button></div>
